name: Bug report
description: Something is broken or behaving incorrectly.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing. Please fill out the fields below — the more concrete the report, the faster we can act.
        For security vulnerabilities, do **not** file here. Email `security@plinth.run`.
  - type: input
    id: package
    attributes:
      label: Package or component
      description: Which Plinth package or component is affected?
      placeholder: "@plinth-dev/authz-react, sdk-go/audit, platform/charts/cerbos, ..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "v0.1.3"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of what went wrong.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: A minimal repro is the single most valuable thing you can include.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime versions, cluster shape, anything else relevant.
      placeholder: |
        - OS: macOS 26.3
        - Go: 1.23.5 / Node: 22.14
        - Cluster: kind v0.30
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: shell
    validations:
      required: false
