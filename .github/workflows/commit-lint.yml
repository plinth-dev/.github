# Reusable workflow: enforce Conventional Commits on PR titles + DCO sign-off
# on every commit in the PR.
#
# Call from another repo's workflow:
#   jobs:
#     commit-lint:
#       uses: plinth-dev/.github/.github/workflows/commit-lint.yml@main
name: Reusable — commit lint

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  conventional-title:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            fix
            feat
            docs
            chore
            refactor
            test
            perf
            build
            ci
            revert

  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify DCO sign-off on every commit
        uses: tisonkun/actions-dco@v1
