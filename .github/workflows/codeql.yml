# Reusable workflow: CodeQL static analysis.
# Call from another repo's workflow:
#   jobs:
#     codeql:
#       uses: plinth-dev/.github/.github/workflows/codeql.yml@main
#       with:
#         languages: '["go", "javascript-typescript"]'
name: Reusable — CodeQL

on:
  workflow_call:
    inputs:
      languages:
        type: string
        required: true
        description: JSON array of CodeQL languages to scan, e.g. '["go"]'.
      build-mode:
        type: string
        default: none
        description: 'CodeQL build mode: none | autobuild | manual.'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyse:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(inputs.languages) }}
    steps:
      - uses: actions/checkout@v5
      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ inputs.build-mode }}
      - name: Analyse
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
